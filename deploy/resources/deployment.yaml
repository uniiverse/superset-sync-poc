apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reports
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reports
    spec:
      containers:
      - name: api
        image: reports
        envFrom:
          - configMapRef:
              name: reports-env
              optional: true
          - secretRef:
              name: reports-env
              optional: true
        ports:
        - name: grpc
          containerPort: 8080
        - name: http
          containerPort: 8081
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz/ready
            port: http
          initialDelaySeconds: 10
        resources:
          requests:
            memory: 256Mi
            cpu: 500m
