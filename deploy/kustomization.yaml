apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: reports

resources:
  - resources/deployment.yaml
  - resources/service.yaml

configMapGenerator:
  - name: redemptions-build-info
    files:
      - ../VERSION
