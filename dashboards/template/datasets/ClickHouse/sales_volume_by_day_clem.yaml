offset: 0
cache_timeout: null
schema: highlander
sql: "SELECT d.\"Event date\",\n       d.\"Quantity sold\",\n       if(d.sort_key\
  \ = 1, NULL, c.total_cap - d.\"Quantity sold\") AS \"Quantity remaining\",\n   \
  \    if(d.sort_key = 1, NULL, round(d.\"Quantity sold\" * 100.0 / NULLIF(c.total_cap,\
  \ 0), 1)) AS \"% sold\",\n       d.\"Net earnings\",\n       d.sort_key\nFROM (\n\
  \  SELECT e.start_date AS \"Event date\",\n         countIf(c.state IN ('paid',\
  \ 'ended', 'closed')) AS \"Quantity sold\",\n         round(SUM(c.net_earnings),\
  \ 2) AS \"Net earnings\",\n         0 AS sort_key\n  FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n  LEFT JOIN events_final e ON c.event_id = e.id\n  WHERE c.listing_id = '6850270235e0d90042a0bac6'\n\
  \    AND c.state IN ('paid', 'ended', 'closed')\n    AND c.rate_type != 'AddOnRate'\n\
  \    AND (c.deleted IS NULL OR c.deleted = 0)\n  GROUP BY e.start_date\n  UNION\
  \ ALL\n  SELECT 'Total',\n         countIf(c.state IN ('paid', 'ended', 'closed')),\n\
  \         round(SUM(c.net_earnings), 2),\n         1\n  FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n  WHERE c.listing_id = '6850270235e0d90042a0bac6'\n    AND c.state IN ('paid',\
  \ 'ended', 'closed')\n    AND c.rate_type != 'AddOnRate'\n    AND (c.deleted IS\
  \ NULL OR c.deleted = 0)\n) AS d\nCROSS JOIN (\n  SELECT SUM(capacity) AS total_cap\n\
  \  FROM rates_by_host_final\n  WHERE listing_id = '6850270235e0d90042a0bac6'\n \
  \   AND capacity IS NOT NULL\n) AS c\nORDER BY sort_key, \"Event date\"\nLIMIT 1000"
