schema: highlander
sql: "SELECT SUM(remaining) AS \"Remaining tickets\"\nFROM (\n  SELECT r.capacity\
  \ - countIf(c.state IN ('paid', 'ended', 'closed')) AS remaining\n  FROM rates_by_host_final\
  \ r\n  LEFT JOIN cost_item_cost_breakdowns_by_host_final c ON c.rate_id = r.id\n\
  \    AND c.rate_type != 'AddOnRate'\n    AND (c.deleted IS NULL OR c.deleted = 0)\n\
  \  WHERE r.listing_id = '6850270235e0d90042a0bac6'\n    AND r.capacity IS NOT NULL\n\
  \  GROUP BY r.id, r.capacity\n) AS virtual_table"
