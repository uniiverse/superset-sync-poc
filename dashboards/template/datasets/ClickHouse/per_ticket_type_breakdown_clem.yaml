schema: null
sql: "SELECT\n    e.start_date                                                   \
  \                         AS event_date,\n    formatDateTime(toDateTime(e.start_stamp),\
  \ '%I:%i %p')                                  AS timeslot,\n    c.name        \
  \                                                                          AS ticket_type,\n\
  \    round(\n        SUM(c.base_price - c.base_voided_price) / NULLIF(countIf(c.state\
  \ IN ('paid', 'ended', 'closed')), 0),\n        2\n    )                       \
  \                                                                AS avg_price_per_ticket,\n\
  \    countIf(c.state IN ('paid', 'ended', 'closed'))                           \
  \             AS quantity_sold,\n    round(SUM(c.base_price - c.base_voided_price),\
  \ 2)                                      AS ticket_revenue,\n    round(SUM(c.base_commission_included\
  \ - c.base_voided_commission_included), 2)           AS service_charge,\n    round(SUM(c.base_fees_total\
  \ - c.base_voided_fees_total), 2)                            AS additional_fees,\n\
  \    round(SUM(c.base_taxes_total - c.base_voided_taxes_total), 2)             \
  \             AS collected_taxes,\n    round(SUM(c.net_earnings), 2)           \
  \                                               AS net_earnings\nFROM cost_item_cost_breakdowns_by_host_final\
  \ c\nLEFT JOIN listings_final l  ON c.listing_id = l.id\nLEFT JOIN events_final\
  \ e    ON c.event_id   = e.id\nWHERE\n    c.listing_id = '6850270235e0d90042a0bac6'\n\
  \    AND c.rate_type != 'AddOnRate'\n    AND c.state IN ('paid', 'ended', 'closed')\n\
  \    AND (c.deleted IS NULL OR c.deleted = 0)\nGROUP BY\n    e.start_date,\n   \
  \ e.start_stamp,\n    c.name\nWITH TOTALS\nORDER BY\n    e.start_stamp,\n    c.name"
