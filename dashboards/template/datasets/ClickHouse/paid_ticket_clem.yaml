sql: "SELECT sum(\"Paid Count\") AS \"SUM(Paid Count)\"\nFROM\n  (SELECT countIf(ticket_status\
  \ IN ('paid', 'ended', 'closed')) AS \"Paid Count\"\n   FROM highlander.fer_tickets_by_host_final\n\
  \   WHERE event_id = '6850270235e0d90042a0bac6'\n     AND ticket_category NOT IN\
  \ ('FreeRate',\n                                 'AddOnRate')) AS virtual_table\n\
  LIMIT 50000"
