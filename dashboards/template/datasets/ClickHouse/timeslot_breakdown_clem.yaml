schema: highlander
sql: "SELECT\n    e.start_date                                                AS \"\
  Event date\",\n    formatDateTime(toDateTime(e.start_stamp), '%I:%i %p')      AS\
  \ \"Timeslot\",\n    round(SUM(c.net_earnings), 2)                             \
  \ AS \"Net earnings\",\n    countIf(c.state IN ('paid', 'ended', 'closed'))    \
  \         AS \"Quantity sold\"\nFROM cost_item_cost_breakdowns_by_host_final c\n\
  LEFT JOIN events_final e ON c.event_id = e.id\nWHERE\n    c.listing_id = '6850270235e0d90042a0bac6'\n\
  \    AND c.state IN ('paid', 'ended', 'closed')\n    AND (c.deleted IS NULL OR c.deleted\
  \ = 0)\nGROUP BY\n    e.start_date,\n    e.start_stamp\n\nUNION ALL\n\nSELECT\n\
  \    'Total'                                                     AS \"Event date\"\
  ,\n    ''                                                          AS \"Timeslot\"\
  ,\n    round(SUM(c.net_earnings), 2)                              AS \"Net earnings\"\
  ,\n    countIf(c.state IN ('paid', 'ended', 'closed'))             AS \"Quantity\
  \ sold\"\nFROM cost_item_cost_breakdowns_by_host_final c\nWHERE\n    c.listing_id\
  \ = '6850270235e0d90042a0bac6'\n    AND c.state IN ('paid', 'ended', 'closed')\n\
  \    AND (c.deleted IS NULL OR c.deleted = 0)\nORDER BY\n    \"Event date\",\n \
  \   \"Timeslot\""
