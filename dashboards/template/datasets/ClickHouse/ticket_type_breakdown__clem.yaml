sql: "SELECT \"Event date\",\n       \"Timeslot\",\n       \"Ticket type\",\n    \
  \   \"Ticket price\",\n       \"Quantity sold\",\n       \"Quantity remaining\"\
  ,\n       \"% sold\",\n       \"Ticket revenue\",\n       \"Net earnings\",\n  \
  \     sort_key,\n       sort_date\nFROM\n  (SELECT e.start_date AS \"Event date\"\
  ,\n          formatDateTime(toDateTime(e.start_stamp), '%I:%i %p') AS \"Timeslot\"\
  ,\n          c.name AS \"Ticket type\",\n          r.capacity AS \"Ticket capacity\"\
  ,\n          round(SUM(c.base_price - c.base_voided_price) / NULLIF(countIf(c.state\
  \ IN ('paid', 'ended', 'closed')), 0), 2) AS \"Ticket price\",\n          countIf(c.state\
  \ IN ('paid', 'ended', 'closed')) AS \"Quantity sold\",\n          r.capacity -\
  \ countIf(c.state IN ('paid', 'ended', 'closed')) AS \"Quantity remaining\",\n \
  \         round(countIf(c.state IN ('paid', 'ended', 'closed')) * 100.0 / NULLIF(r.capacity,\
  \ 0), 1) AS \"% sold\",\n          round(SUM(c.base_price - c.base_voided_price),\
  \ 2) AS \"Ticket revenue\",\n          round(SUM(c.net_earnings), 2) AS \"Net earnings\"\
  ,\n          0 AS sort_key,\n          min(e.start_stamp) AS sort_date\n   FROM\
  \ cost_item_cost_breakdowns_by_host_final c\n   LEFT JOIN listings_final l ON c.listing_id\
  \ = l.id\n   LEFT JOIN events_final e ON c.event_id = e.id\n   LEFT JOIN rates_by_host_final\
  \ r ON r.id = c.rate_id\n   WHERE c.listing_id = '6850270235e0d90042a0bac6'\n  \
  \   AND c.rate_type != 'AddOnRate'\n     AND c.state IN ('paid', 'ended', 'closed')\n\
  \     AND (c.deleted IS NULL OR c.deleted = 0)\n   GROUP BY e.start_date,\n    \
  \        e.start_stamp,\n            c.name,\n            r.capacity\n\n   UNION\
  \ ALL\n\n   SELECT 'Total' AS \"Event date\",\n          '' AS \"Timeslot\",\n \
  \         '' AS \"Ticket type\",\n          NULL AS \"Ticket capacity\",\n     \
  \     NULL AS \"Ticket price\",\n          countIf(c.state IN ('paid', 'ended',\
  \ 'closed')) AS \"Quantity sold\",\n          NULL AS \"Quantity remaining\",\n\
  \          NULL AS \"% sold\",\n          round(SUM(c.base_price - c.base_voided_price),\
  \ 2) AS \"Ticket revenue\",\n          round(SUM(c.net_earnings), 2) AS \"Net earnings\"\
  ,\n          1 AS sort_key,\n          9999999999 AS sort_date\n   FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n   WHERE c.listing_id = '6850270235e0d90042a0bac6'\n     AND c.rate_type !=\
  \ 'AddOnRate'\n     AND c.state IN ('paid', 'ended', 'closed')\n     AND (c.deleted\
  \ IS NULL OR c.deleted = 0)\n\n   ORDER BY sort_key, sort_date, \"Event date\",\
  \ \"Ticket type\") AS virtual_table\nLIMIT 1000"
