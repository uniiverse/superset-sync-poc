sql: "SELECT\n  order_id,\n  event_id,\n  host_id,\n  currency,\n  timeslot_start_time,\n\
  \  timeslot_end_time,\n  ticket_category,\n  min(toDateTime(purchase_time)) AS purchase_time\n\
  FROM highlander.fer_tickets_by_host_final\nWHERE order_status IN ('paid', 'ended',\
  \ 'closed', 'partially_paid', 'disputed')\nGROUP BY host_id, order_id, event_id,\
  \ currency, timeslot_start_time, timeslot_end_time, ticket_category"
