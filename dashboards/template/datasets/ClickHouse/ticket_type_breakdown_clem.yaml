schema: null
sql: "SELECT\n    e.start_date                                                   \
  \                         AS \"Event date\",\n    formatDateTime(toDateTime(e.start_stamp),\
  \ '%I:%i %p')                                  AS \"Timeslot\",\n    c.name    \
  \                                                                              AS\
  \ \"Ticket type\",\n    r.capacity                                             \
  \                                 AS \"Ticket capacity\",\n    round(\n        SUM(c.base_price\
  \ - c.base_voided_price) / NULLIF(countIf(c.state IN ('paid', 'ended', 'closed')),\
  \ 0),\n        2\n    )                                                        \
  \                               AS \"Ticket price\",\n    countIf(c.state IN ('paid',\
  \ 'ended', 'closed'))                                        AS \"Quantity sold\"\
  ,\n    r.capacity - countIf(c.state IN ('paid', 'ended', 'closed'))            \
  \               AS \"Quantity remaining\",\n    round(SUM(c.base_price - c.base_voided_price),\
  \ 2)                                      AS \"Ticket revenue\",\n    round(SUM(c.base_commission_included\
  \ - c.base_voided_commission_included), 2)           AS \"Service charge\",\n  \
  \  round(SUM(c.base_fees_total - c.base_voided_fees_total), 2)                 \
  \           AS \"Additional fees\",\n    round(SUM(c.base_taxes_total - c.base_voided_taxes_total),\
  \ 2)                          AS \"Collected taxes\",\n    round(SUM(c.net_earnings),\
  \ 2)                                                          AS \"Net earnings\"\
  \nFROM cost_item_cost_breakdowns_by_host_final c\nLEFT JOIN listings_final l   \
  \   ON c.listing_id = l.id\nLEFT JOIN events_final e        ON c.event_id   = e.id\n\
  LEFT JOIN rates_by_host_final r ON r.id         = c.rate_id\nWHERE\n    c.listing_id\
  \ = '6850270235e0d90042a0bac6'\n    AND c.rate_type != 'AddOnRate'\n    AND c.state\
  \ IN ('paid', 'ended', 'closed')\n    AND (c.deleted IS NULL OR c.deleted = 0)\n\
  GROUP BY\n    e.start_date,\n    e.start_stamp,\n    c.name,\n    r.capacity\nWITH\
  \ TOTALS\nORDER BY\n    e.start_stamp,\n    c.name"
