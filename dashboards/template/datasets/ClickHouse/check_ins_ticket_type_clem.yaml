cache_timeout: null
schema: highlander
sql: "SELECT formatDateTime(timeslot_start_time, '%Y-%m-%d') AS \"Event date\",\n\
  \       formatDateTime(timeslot_start_time, '%r') AS \"Start time \",\n       event_name\
  \ AS event_name,\n       ticket_type AS \"Ticket type\",\n       SUM(redemption_balance\
  \ > 0) AS \"Checked-in\",\n       sum(CASE\n               WHEN redemption_balance\
  \ IS NULL\n                    OR redemption_balance = 0 THEN 1\n              \
  \ ELSE 0\n           END) AS \"Remaining check-ins\"\nFROM highlander.fer_tickets_by_host_joined_events_final\n\
  WHERE ticket_status IN ('paid',\n                        'ended',\n            \
  \            'closed')\n  AND (host_id='660efdd2dddcc1021aa206f8'\n       AND currency='USD')\n\
  GROUP BY formatDateTime(timeslot_start_time, '%Y-%m-%d'),\n         formatDateTime(timeslot_start_time,\
  \ '%r'),\n         event_name,\n         ticket_type\nORDER BY \"Checked-in\" DESC\n\
  LIMIT 50000"
