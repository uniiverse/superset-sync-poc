schema: null
sql: "SELECT\n    e.start_date                                                AS event_date,\n\
  \    formatDateTime(toDateTime(e.start_stamp), '%I:%i %p')      AS timeslot,\n \
  \   c.name                                                      AS addon_name,\n\
  \    c.option_name                                               AS addon_option,\n\
  \    round(\n        SUM(c.base_price - c.base_voided_price) / NULLIF(countIf(c.state\
  \ IN ('paid', 'ended', 'closed')), 0),\n        2\n    )                       \
  \                                    AS avg_price_per_addon,\n    countIf(c.state\
  \ IN ('paid', 'ended', 'closed'))             AS quantity_sold\nFROM cost_item_cost_breakdowns_by_host_final\
  \ c\nLEFT JOIN listings_final l  ON c.listing_id = l.id\nLEFT JOIN events_final\
  \ e    ON c.event_id   = e.id\nWHERE\n    c.listing_id = '67ae35891a7a0200238bbb7a'\n\
  \    AND c.rate_type = 'AddOnRate'\n    AND (c.deleted IS NULL OR c.deleted = 0)\n\
  GROUP BY\n    e.start_date,\n    e.start_stamp,\n    c.name,\n    c.option_name\n\
  WITH TOTALS\nORDER BY\n    e.start_stamp,\n    c.name,\n    c.option_name"
