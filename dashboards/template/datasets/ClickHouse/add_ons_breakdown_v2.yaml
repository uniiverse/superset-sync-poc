sql: "SELECT \"Event date\",\n       \"Timeslot\",\n       \"Add-on name\",\n    \
  \   \"Add-on option\",\n       \"Face value\",\n       \"Quantity sold\",\n    \
  \   round(\"Quantity sold\" * \"Face value\", 2) AS \"Revenue\",\n       sort_key,\n\
  \       sort_date\nFROM\n  (SELECT '2025-06-17' AS \"Event date\", '07:00 PM' AS\
  \ \"Timeslot\", 'T-Shirt' AS \"Add-on name\", 'Small'  AS \"Add-on option\", 20.0\
  \ AS \"Face value\", 8  AS \"Quantity sold\", 0 AS sort_key, 1 AS sort_date\n  \
  \ UNION ALL\n   SELECT '2025-06-17', '07:00 PM', 'T-Shirt', 'Medium', 20.0, 12,\
  \ 0, 2\n   UNION ALL\n   SELECT '2025-06-17', '07:00 PM', 'T-Shirt', 'Large',  20.0,\
  \ 6,  0, 3\n   UNION ALL\n   SELECT '2025-06-17', '07:00 PM', 'Parking pass',  '',\
  \ 15.0, 9,  0, 4\n   UNION ALL\n   SELECT '2025-06-17', '07:00 PM', 'Merch package',\
  \ '', 35.0, 5,  0, 5\n   UNION ALL\n   SELECT 'Total', '', '', '', NULL, 40, 1,\
  \ 9999999999) AS virtual_table\n\nORDER BY sort_key, sort_date, \"Add-on name\"\
  , \"Add-on option\"\nLIMIT 1000"
