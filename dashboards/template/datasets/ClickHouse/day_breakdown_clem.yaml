sql: "SELECT \"Event date\", \"Quantity sold\", \"Net earnings\"\nFROM (\n  SELECT\
  \ e.start_date AS \"Event date\",\n         countIf(c.state IN ('paid', 'ended',\
  \ 'closed')) AS \"Quantity sold\",\n         round(SUM(c.net_earnings), 2) AS \"\
  Net earnings\",\n         0 AS sort_key\n  FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n  LEFT JOIN events_final e ON c.event_id = e.id\n  WHERE c.listing_id = '6850270235e0d90042a0bac6'\n\
  \    AND c.state IN ('paid', 'ended', 'closed')\n    AND (c.deleted IS NULL OR c.deleted\
  \ = 0)\n  GROUP BY e.start_date\n  UNION ALL\n  SELECT 'Total',\n         countIf(c.state\
  \ IN ('paid', 'ended', 'closed')),\n         round(SUM(c.net_earnings), 2),\n  \
  \       1\n  FROM cost_item_cost_breakdowns_by_host_final c\n  WHERE c.listing_id\
  \ = '6850270235e0d90042a0bac6'\n    AND c.state IN ('paid', 'ended', 'closed')\n\
  \    AND (c.deleted IS NULL OR c.deleted = 0)\n) AS virtual_table\nORDER BY sort_key,\
  \ \"Event date\"\nLIMIT 1000"
