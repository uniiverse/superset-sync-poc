sql: "SELECT\n    round(\n        COUNT(DISTINCT id) / NULLIF(COUNT(DISTINCT order_id),\
  \ 0),\n        2\n    ) AS avg_tickets_per_order\nFROM fer_tickets_by_host_final\n\
  WHERE\n    event_id = '6850270235e0d90042a0bac6'\n    AND order_status IN ('paid',\
  \ 'ended', 'closed')\n    AND ticket_category != 'AddOnRate'"
