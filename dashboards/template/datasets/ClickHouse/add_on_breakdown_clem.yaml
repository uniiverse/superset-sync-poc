sql: "SELECT \"Event date\",\n       \"Timeslot\",\n       \"Add-on name\",\n    \
  \   \"Add-on option\",\n       \"Face value\",\n       \"Quantity sold\",\n    \
  \   \"Revenue\",\n       sort_key,\n       sort_date\nFROM\n  (SELECT e.start_date\
  \ AS \"Event date\",\n          formatDateTime(toDateTime(e.start_stamp), '%I:%i\
  \ %p') AS \"Timeslot\",\n          c.name AS \"Add-on name\",\n          c.option_name\
  \ AS \"Add-on option\",\n          round(SUM(c.base_price - c.base_voided_price)\
  \ / NULLIF(countIf(c.state IN ('paid', 'ended', 'closed')), 0), 2) AS \"Face value\"\
  ,\n          countIf(c.state IN ('paid', 'ended', 'closed')) AS \"Quantity sold\"\
  ,\n          round(SUM(c.base_price - c.base_voided_price), 2) AS \"Revenue\",\n\
  \          0 AS sort_key,\n          min(e.start_stamp) AS sort_date\n   FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n   LEFT JOIN listings_final l ON c.listing_id = l.id\n   LEFT JOIN events_final\
  \ e ON c.event_id = e.id\n   WHERE c.listing_id = '67ae35891a7a0200238bbb7a'\n \
  \    AND c.rate_type = 'AddOnRate'\n     AND (c.deleted IS NULL OR c.deleted = 0)\n\
  \   GROUP BY e.start_date,\n            e.start_stamp,\n            c.name,\n  \
  \          c.option_name\n\n   UNION ALL\n\n   SELECT 'Total' AS \"Event date\"\
  ,\n          '' AS \"Timeslot\",\n          '' AS \"Add-on name\",\n          ''\
  \ AS \"Add-on option\",\n          round(SUM(c.base_price - c.base_voided_price)\
  \ / NULLIF(countIf(c.state IN ('paid', 'ended', 'closed')), 0), 2) AS \"Face value\"\
  ,\n          countIf(c.state IN ('paid', 'ended', 'closed')) AS \"Quantity sold\"\
  ,\n          round(SUM(c.base_price - c.base_voided_price), 2) AS \"Add-on revenue\"\
  ,\n          1 AS sort_key,\n          9999999999 AS sort_date\n   FROM cost_item_cost_breakdowns_by_host_final\
  \ c\n   WHERE c.listing_id = '67ae35891a7a0200238bbb7a'\n     AND c.rate_type =\
  \ 'AddOnRate'\n     AND (c.deleted IS NULL OR c.deleted = 0)\n\n   ORDER BY sort_key,\
  \ sort_date, \"Add-on name\", \"Add-on option\") AS virtual_table\nLIMIT 1000"
