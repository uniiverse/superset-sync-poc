  \  font-size: 32px !important;\n  margin-left: -16px !important;\n  line-height:\
  \ 38px !important;\n  word-wrap: break-word;\n}\n\n.dashboard-component-divider\
  \ {\n  padding-left: 0px !important;\n  padding-right: 0px !important;\n  padding-top:\
  \ 0px !important;\n  padding-bottom: 0px !important;\n}\n\n/*------Tabs--------*/\n\
  .ant-tabs-nav-wrap {\n  border-bottom: 1px solid #E2E5E7;\n}\n\n.ant-tabs-nav-list\
  \ {\n  margin-left: -16px;\n}\n\n.ant-tabs-tab {\n  color: #1C232B;\n}\n\n.ant-tabs-tab-btn\
  \ {\n   font-weight: 400 !important;\n   line-height: 20px !important;\n   font-family:\
  \ 'Graphik', sans-serif !important;\n   font-size: 14px !important;\n}\n\n.ant-tabs-tab:hover\
  \ {\n  color: #3A66E5 !important\n}\n\n.ant-tabs-tab-btn:hover {\n   color: #3A66E5\
  \ !important;\n}\n\n.ant-tabs-tab-btn.active {\n  color: #3A66E5 !important;\n}\n\
  \n.ant-tabs-tab-active {\n  color: #3A66E5 !important;\n}\n\n.ant-tabs-ink-bar-animated\
  \ {\n  background-color: #3A66E5 !important;\n}\n\n/*----Charts-------*/\n\n.chart-slice\
  \ {\n  border: 1px solid #E2E5E7;\n  padding: 16px; \n  border-radius: 6px;\n  margin-left:\
  \ 0px;\n  overflow: auto !important;\n  margin-right: 0px;\n}\n\n.dot {\n  background-color:\
  \ #1C232B !important;\n}\n\n.dashboard-component-chart-holder {\n  padding: 0px\
  \ !important;\n}\n\n.dashboard-chart-id-137 tr:first-child th {\n  color: #6F7881\
  \ !important;\n  text-transform: capitalize;\n}\n\n/*Removing the metric heading\
  \ from charts in tabs that appear \nwithout any data below. Now only an empty row\
  \ \nwith no heading is viisble.*/\n\ntr:first-child th.pvtAxisLabel {\n  color:\
  \ transparent;\n}\n\n.pivot_table_v_2 thead th {\n  font-size: 14px !important;\n\
  \  font-weight: bold !important;\n}\n\n/*----Promotions- To adjust serach box from\
  \ cutting off---*/\n.dt-global-filter {\n  width: 100% !important;\n  min-width:\
  \ 100% !important;\n  max-width: 100% !important;\n  padding-right: 10px !important;\n\
  \  text-align: end !important;\n}\n\n.text-container {\n  height: auto !important;\n\
  }\n\n.header-title {\n  font-weight: 700 !important;\n  color: #000000 !important;\n\
  \  font-family: 'Graphik', sans-serif !important;\n  line-height: 24px !important;\n\
  \  font-size: 16px !important;\n  margin-bottom: 24px;\n}\n\n.header-line {\n  font-size:\
  \ 32px !important;\n  color: #1C232B !important;\n  font-weight: 500 !important;\n\
  \  line-height: 38px !important;\n  font-family: 'Circular Pro', sans-serif !important;\n\
  }\n\n.subheader-line {\n  font-size: 14px !important;\n  color: #6F7881 !important;\n\
  \  line-height: 20px !important;\n  font-family: 'Graphik', sans-serif !important;\n\
  \  font-weight: 400;\n  margin-top: -20px !important;\n}\n\n.pie canvas {\n  margin-top:\
  \ 0px !important;\n}\n\n.echarts_timeseries_line canvas {\n  margin-top: 0px !important;\n\
  }\n\n.big_number canvas {\n  margin-top: 50px !important;\n}\n\n/*----Adds a scroller\
  \ when required and adjust the height of the table\nto show all the content----*/\n\
  .pivot_table_v_2 {\n  overflow: auto !important;\n  height: auto !important;\n}\n\
  \n\n/*-----Charts under Check-ins by tabs------*/\n\n.dashboard-chart-id-161 .header-title\
  \ {\n  visibility: hidden !important;\n}\n\n.dashboard-chart-id-162 .header-title\
