metrics:
- metric_name: Ticket sales
  verbose_name: Ticket sales
  metric_type: null
  expression: "roundBankers(SUM(if(\r\n        ((ticket_category IS NULL\r\n     \
    \   OR ticket_category IN ('Rate',\r\n                               'FreeRate',\r\
    \n                               'pwycRate',\r\n                             \
    \  'PassRate'))),\r\n        price - voided_price,\r\n        0\r\n    )),2)"
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Cash sales
  verbose_name: Cash sales
  metric_type: null
  expression: "roundBankers(\n    SUM(\n        IF(\n            payment_type = 'offline',\n\
    \            price - voided_price,\n            0\n        )\n    ), 2\n)"
  description: null
  d3format: null
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Add-on quantity sold
  verbose_name: Add-on quantity sold
  metric_type: null
  expression: SUM(if(ticket_category = 'AddOnRate' AND ticket_status IN ('paid', 'ended',
    'closed'), 1, 0))
  description: null
  d3format: null
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Total discounts
  verbose_name: Total discounts
  metric_type: null
  expression: roundBankers(SUM(if(discount_code NOT IN ('comp','other','TRANSFER'),
    discount - voided_discount, 0)),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Additional fees
  verbose_name: Additional fees
  metric_type: null
  expression: roundBankers(SUM(if(order_status NOT IN ('cancelled'), fees_total -
    voided_fees_total, 0)),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Collected taxes
  verbose_name: Collected taxes
  metric_type: null
  expression: roundBankers(SUM(if(order_status NOT IN ('cancelled'), taxes_total -
    voided_taxes_total, 0)),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Ticket count (WIP)
  verbose_name: Ticket count
  metric_type: null
  expression: roundBankers(SUM(if(ticket_status IN ('paid', 'ended', 'closed'), 1,
    0)),2)
  description: null
  d3format: null
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Add-on sales
  verbose_name: Add-on sales
  metric_type: null
  expression: roundBankers(SUM(if(ticket_category IN ('AddOnRate'), price - voided_price,
    0)),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Net of tax
  verbose_name: Net of tax
  metric_type: null
  expression: roundBankers(SUM(net_earnings - (taxes_total - voided_taxes_total)),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Service charge, included in price
  verbose_name: Service charge, included in price
  metric_type: null
  expression: roundBankers(SUM(commission_included-voided_commission_included),2)
  description: null
  d3format: $,.2f
  extra:
    warning_markdown: ''
  warning_text: null
- metric_name: Tax on Universe service fee
