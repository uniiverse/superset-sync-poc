networks:
  universe:
    name: universe
    driver: bridge

version: '3.7'
name: "clickhouse"

services:
  clickhouse:
    build:
      context: ./
      dockerfile: ./Dockerfile
    ports:
      - 9000:9000
    volumes:
      - ./:/app
    networks:
      - universe