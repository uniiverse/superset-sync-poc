name: Sync Dashboards from Staging Superset

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  NODE_VERSION: '20.11.0'

jobs:
  sync-dashboards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Google Artifact Registry
        run: |
          gcloud artifacts print-settings npm --project=tm-uni-platform --repository=js --location=us-east4 --scope=@universe > .npmrc
          npx -y google-artifactregistry-auth --repo-config .npmrc --credential-config .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Export dashboards from Superset
        env:
          SUPERSET_URL: ${{ secrets.SUPERSET_URL }}
          SUPERSET_USERNAME: ${{ secrets.SUPERSET_USERNAME }}
          SUPERSET_PASSWORD: ${{ secrets.SUPERSET_PASSWORD }}
        run: npm run export

      - name: Check for changes
        id: check_changes
        run: |
          git add dashboards/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No dashboard changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Dashboard changes detected"
            git diff --staged --stat
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore: sync dashboards from staging Superset

            Auto-sync from staging Superset instance.
            Dashboards exported and committed automatically.
          branch: automated/sync-dashboards-${{ github.run_number }}
          delete-branch: true
          title: '[Staging] Sync dashboards from Superset'
          body: |
            ## 🤖 Automated Dashboard Sync from Staging

            This PR contains dashboard updates detected in the staging Superset instance.

            ### Changes
            Dashboards exported from: `${{ secrets.SUPERSET_URL }}`

            ### Review Checklist
            - [ ] Verify dashboard YAML changes look correct
            - [ ] Check for any unexpected modifications
            - [ ] Confirm this is from staging (not production)

            ---
            🤖 Generated automatically by [sync workflow](.github/workflows/sync-dashboards-staging.yaml)

            ⚠️ **This is a test/POC workflow** - changes are for testing purposes only.
          labels: |
            automated
            dashboards
            staging
            poc

      - name: Workflow Summary
        run: |
          echo "## Dashboard Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Superset URL:** ${{ secrets.SUPERSET_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes detected:** ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

