name: Sync Dashboards from Staging Superset

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync-dashboards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'npm'

      - name: Install bash dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq unzip

      - name: Install npm dependencies
        run: npm ci

      - name: Export dashboards from Superset
        env:
          SUPERSET_URL: ${{ secrets.SUPERSET_URL }}
          SUPERSET_USERNAME: ${{ secrets.SUPERSET_USERNAME }}
          SUPERSET_PASSWORD: ${{ secrets.SUPERSET_PASSWORD }}
        run: |
          set +e  # Don't exit on error, we want to catch it

          echo "🔐 Authenticating with Superset..."
          echo "SUPERSET_URL is set: ${SUPERSET_URL:+yes}"
          echo "Connecting to: ${SUPERSET_URL}/api/v1/security/login"

          RESPONSE=$(curl -s -w "\n%{http_code}" "${SUPERSET_URL}/api/v1/security/login" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${SUPERSET_USERNAME}\",\"password\":\"${SUPERSET_PASSWORD}\",\"provider\":\"db\",\"refresh\":true}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Authentication failed with status $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ Authentication failed - no token in response"
            echo "Response: $BODY"
            exit 1
          fi

          echo "✅ Authenticated successfully"
          echo ""

          echo "📥 Exporting dashboards from ${SUPERSET_URL}..."
          mkdir -p tmp

          # Export all assets as ZIP
          curl -s "${SUPERSET_URL}/api/v1/assets/export/" \
            -H "Authorization: Bearer $TOKEN" \
            --output tmp/dashboards.zip

          if [ ! -f tmp/dashboards.zip ]; then
            echo "❌ Export failed"
            exit 1
          fi

          echo "✅ Downloaded dashboards.zip"
          echo ""

          echo "📦 Extracting all assets..."
          unzip -o tmp/dashboards.zip -d tmp/extracted > /dev/null 2>&1

          # Find the assets directory (it has a timestamp in the name)
          ASSETS_DIR=$(find tmp/extracted -type d -name "assets_export_*" | head -1)

          if [ -z "$ASSETS_DIR" ]; then
            echo "❌ Could not find assets in ZIP"
            exit 1
          fi

          # Copy entire assets export to dashboards/template/
          mkdir -p dashboards/template
          cp -r "$ASSETS_DIR/"* dashboards/template/ 2>/dev/null || true

          # Count extracted files
          DASHBOARD_COUNT=$(find dashboards/template/dashboards -type f 2>/dev/null | wc -l | xargs)
          CHART_COUNT=$(find dashboards/template/charts -type f 2>/dev/null | wc -l | xargs)
          DATASET_COUNT=$(find dashboards/template/datasets -type f 2>/dev/null | wc -l | xargs)
          DATABASE_COUNT=$(find dashboards/template/databases -type f 2>/dev/null | wc -l | xargs)

          echo "✅ Extracted to dashboards/template/"
          echo "   - Dashboards: $DASHBOARD_COUNT"
          echo "   - Charts: $CHART_COUNT"
          echo "   - Datasets: $DATASET_COUNT"
          echo "   - Databases: $DATABASE_COUNT"

          # Cleanup
          rm -rf tmp

          echo ""
          echo "🎉 Export complete!"

      - name: Render localized dashboards
        run: |
          echo "🌐 Rendering localized dashboards..."
          npm run render-dashboards
          echo "✅ Rendered all language versions"

      - name: Check for changes
        id: check_changes
        run: |
          git add dashboards/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in Superset assets"
            git diff --staged --stat
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore: sync all Superset assets from staging

            Auto-sync from staging Superset instance.
            Includes: dashboards, charts, datasets, databases.
            Exported and committed automatically.
          branch: automated/sync-dashboards-${{ github.run_number }}
          delete-branch: true
          title: '[Staging] Sync Superset assets (dashboards, charts, datasets, databases)'
          body: |
            ## 🤖 Automated Superset Asset Sync from Staging

            This PR contains updates to Superset assets detected in the staging instance.

            **Synced assets:**
            - 📊 Dashboards
            - 📈 Charts
            - 🗄️ Datasets
            - 💾 Databases

            ### Changes
            Assets exported from: `${{ secrets.SUPERSET_URL }}`

            ### Review Checklist
            - [ ] Verify dashboard YAML changes look correct
            - [ ] Check for any unexpected modifications
            - [ ] Confirm this is from staging (not production)

            ---
            🤖 Generated automatically by [sync workflow](.github/workflows/sync-dashboards-staging.yaml)

            ⚠️ **This is a test/POC workflow** - changes are for testing purposes only.
          labels: |
            automated
            dashboards
            staging
            poc

      - name: Workflow Summary
        run: |
          echo "## Dashboard Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Superset URL:** ${{ secrets.SUPERSET_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes detected:** ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
