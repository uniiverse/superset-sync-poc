name: Pull Request Pipeline

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.11.0'

jobs:
  validate-title:
    runs-on: nix-runners
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  install:
    runs-on: universe-runners
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate application token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ARC_RELEASE_APP_ID }}
          private-key: ${{ secrets.ARC_RELEASE_PRIVATE_KEY }}
          owner: uniiverse
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup Google Artifact Registry
        run: |
          gcloud artifacts print-settings npm --project=tm-uni-platform --repository=js --location=us-east4 --scope=@universe > .npmrc
          npx -y google-artifactregistry-auth --repo-config .npmrc --credential-config .npmrc
      - name: Install dependencies
        run: npm ci
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

  lint:
    needs: install
    runs-on: universe-runners
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Run lint
        run: npm run lint

  test:
    needs: install
    runs-on: universe-runners
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Run Test
        run: npm run test
